name: eBay Alert Scan

on:
  schedule:
    - cron: '*/5 * * * *'
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run eBay scan
        env:
          EBAY_CLIENT_ID:     ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
          SENDGRID_API_KEY:   ${{ secrets.SENDGRID_API_KEY }}
          ALERT_FROM_EMAIL:   ${{ secrets.ALERT_FROM_EMAIL }}
          ALERT_TO_EMAIL:     ${{ secrets.ALERT_TO_EMAIL }}
        run: python bot.py

      - name: Save seen listings back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_listings.json
          git diff --staged --quiet || git commit -m "Update seen listings"
          git push
